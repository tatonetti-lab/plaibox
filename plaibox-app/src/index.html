<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plaibox</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="vendor/xterm.css">
</head>
<body>
  <script>
    // Hide module/exports so UMD bundles export to globalThis instead of CJS
    var __m = window.module; var __e = window.exports;
    delete window.module; delete window.exports;
  </script>
  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <script>
    if (typeof __m !== 'undefined') window.module = __m;
    if (typeof __e !== 'undefined') window.exports = __e;
  </script>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-filter">
        <input type="text" id="filter-input" placeholder="Filter projects...">
      </div>
      <div id="project-list"></div>
      <div id="sidebar-actions">
        <button id="btn-new">+ New</button>
        <button id="btn-sync">Sync</button>
      </div>
    </aside>
    <main id="center">
      <div id="action-bar">
        <span id="project-name">No project selected</span>
        <span id="project-status"></span>
        <div id="action-buttons"></div>
      </div>
      <div id="terminal-tabs"></div>
      <div id="terminal-container"></div>
    </main>
    <div id="notes-resize-handle"></div>
    <aside id="notes-panel">
      <div id="notes-header">
        <span>Notes</span>
      </div>
      <div id="notes-content" contenteditable="true"></div>
      <div id="notes-footer">
        <input type="text" id="quick-note" placeholder="Quick note...">
      </div>
    </aside>
    <button id="make-note-btn">Make Note</button>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
